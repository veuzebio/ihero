<section id="education" aria-labelledby="education-heading" class="px-6 py-24">
  <div class="max-w-2xl mx-auto">
    <h2 id="education-heading" class="text-3xl font-bold text-neutral-900 dark:text-dark-text mb-12">Formação</h2>

    <app-timeline-list>
      @for (item of education; track item.institution + item.degree) {
        <app-timeline-item>
          <span class="text-base font-semibold text-neutral-900 dark:text-dark-text">{{ item.degree }}</span>
          <span class="text-sm text-neutral-600 dark:text-dark-muted">{{ item.institution }}</span>
          <span class="text-xs text-neutral-400 dark:text-dark-muted">{{ item.year }}</span>
        </app-timeline-item>
      }
    </app-timeline-list>
  </div>
</section>
