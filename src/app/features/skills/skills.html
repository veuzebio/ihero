<section id="skills" aria-labelledby="skills-heading" class="snap-start min-h-svh flex flex-col justify-center px-6 py-24 bg-neutral-50 dark:bg-dark-bg">
  <div class="max-w-5xl mx-auto w-full">
    <h2 id="skills-heading" class="text-3xl font-bold text-neutral-900 dark:text-dark-text mb-12">Habilidades</h2>

    <ul class="flex flex-wrap gap-4" role="list">
      @for (skill of skills; track skill.name) {
        <li class="flex items-center gap-2 px-4 py-3 rounded-xl bg-neutral-100 dark:bg-dark-surface">
          <span class="text-base font-semibold text-neutral-900 dark:text-dark-text">{{ skill.name }}</span>
          @if (skill.level === 'avançado') {
            <app-icon name="crown" [size]="14" class="text-amber-400" />
          }
        </li>
      }
    </ul>
  </div>
</section>
