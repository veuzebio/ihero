<section id="experience" aria-labelledby="experience-heading" class="snap-start min-h-svh flex flex-col justify-center px-6 py-24">
  <div class="max-w-5xl mx-auto w-full">
    <h2 id="experience-heading" class="text-3xl font-bold text-neutral-900 dark:text-dark-text mb-12">
      Experiência
    </h2>

    <app-timeline-list>
      @for (item of items; track item.company + '-' + item.period) {
        <app-timeline-item>
          <span class="text-base font-semibold text-neutral-900 dark:text-dark-text">{{ item.role }}</span>
          <span class="text-sm text-neutral-600 dark:text-dark-muted">{{ item.company }}</span>
          <span class="text-xs text-neutral-400 dark:text-dark-muted">{{ item.period }}</span>
          <p class="text-sm text-neutral-600 dark:text-dark-muted mt-1">{{ item.description }}</p>
        </app-timeline-item>
      }
    </app-timeline-list>
  </div>
</section>
