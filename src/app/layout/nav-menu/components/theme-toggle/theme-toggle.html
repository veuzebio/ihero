@if (variant() === 'icon') {
  <button
    type="button"
    class="flex items-center gap-1.5 p-1.5 rounded-full transition-colors duration-200 text-neutral-600 dark:text-dark-muted hover:bg-neutral-100 dark:hover:bg-dark-surface-2"
    [attr.aria-label]="themeService.isDark() ? 'Ativar modo claro' : 'Ativar modo escuro'"
    [attr.aria-pressed]="themeService.isDark()"
    (click)="themeService.toggle()"
  >
    @if (themeService.isDark()) {
      <app-icon name="sun" [size]="18" />
    } @else {
      <app-icon name="moon" [size]="18" />
    }
  </button>
}

@if (variant() === 'switch') {
  <button
    type="button"
    class="w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm font-medium transition-colors duration-200
      text-neutral-600 dark:text-dark-muted
      hover:bg-neutral-100 dark:hover:bg-dark-surface-2
      hover:text-neutral-900 dark:hover:text-dark-text"
    [attr.aria-label]="themeService.isDark() ? 'Ativar modo claro' : 'Ativar modo escuro'"
    [attr.aria-pressed]="themeService.isDark()"
    (click)="themeService.toggle()"
  >
    <!-- Switch track -->
    <span
      class="relative inline-flex h-5 w-9 shrink-0 items-center rounded-full transition-colors duration-300"
      [class.bg-accent]="themeService.isDark()"
      [class.bg-neutral-300]="!themeService.isDark()"
      aria-hidden="true"
    >
      <span
        class="absolute flex items-center justify-center h-3.5 w-3.5 rounded-full bg-white shadow transition-transform duration-300"
        [class.translate-x-4]="themeService.isDark()"
        [class.translate-x-0.5]="!themeService.isDark()"
      >
        @if (themeService.isDark()) {
          <app-icon name="moon" [size]="8" class="text-accent" />
        } @else {
          <app-icon name="sun" [size]="8" class="text-neutral-400" />
        }
      </span>
    </span>
    <span>{{ themeService.isDark() ? 'Modo claro' : 'Modo escuro' }}</span>
  </button>
}
