<!-- Top bar — mobile only -->
<div class="lg:hidden fixed top-0 left-0 right-0 z-50 h-12 bg-white dark:bg-dark-surface flex items-center justify-between px-4 transition-colors duration-300">
  <button
    type="button"
    class="p-1.5 text-neutral-600 dark:text-dark-muted hover:bg-neutral-100 dark:hover:bg-dark-surface-2 hover:text-neutral-900 dark:hover:text-dark-text transition-colors duration-200"
    [attr.aria-expanded]="isOpen()"
    aria-controls="nav-sidebar"
    [attr.aria-label]="isOpen() ? 'Fechar menu de navegação' : 'Abrir menu de navegação'"
    (click)="toggleMenu()"
  >
    @if (isOpen()) {
      <app-icon name="close" [size]="20" />
    } @else {
      <app-icon name="hamburger" [size]="20" />
    }
  </button>

  <app-theme-toggle variant="icon" />
</div>

<!-- Backdrop — mobile only -->
@if (isOpen()) {
  <div
    class="lg:hidden fixed inset-0 z-30 bg-black/20"
    aria-hidden="true"
    (click)="closeMenu()"
  ></div>
}

<!-- Sidebar -->
<nav
  #navSidebar
  id="nav-sidebar"
  aria-label="Navegação da página"
  class="fixed top-0 left-0 z-40 h-full w-52 flex flex-col pt-16 pb-8 px-4
    bg-white dark:bg-dark-surface
    -translate-x-full lg:translate-x-0
    transition-[translate,background-color,color] duration-300"
  [class.-translate-x-full]="!isOpen()"
  [class.translate-x-0]="isOpen()"
  [attr.inert]="(!isOpen() && !isDesktop()) ? '' : null"
  (keydown)="onNavKeydown($event)"
>
  <ul role="list" class="flex flex-col gap-1 flex-1">
    @for (item of navItems; track item.id) {
      <li>
        <a
          [href]="'#' + item.id"
          [class]="navLinkClass(item.id)"
          [attr.aria-current]="activeSection() === item.id ? 'location' : null"
          (click)="closeMenu()"
        >
          {{ item.label }}
        </a>
      </li>
    }
  </ul>

  <!-- Theme toggle — desktop sidebar (bottom) -->
  <div class="hidden lg:block mt-auto pt-4 border-t border-neutral-200 dark:border-dark-border">
    <app-theme-toggle variant="switch" />
  </div>
</nav>
