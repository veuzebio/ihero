<!-- Top bar — mobile only -->
<div class="lg:hidden fixed top-0 left-0 right-0 z-50 h-12 bg-white dark:bg-dark-surface flex items-center justify-between px-4 transition-colors duration-300">
  <button
    type="button"
    class="p-1.5 text-neutral-600 dark:text-dark-muted hover:bg-neutral-100 dark:hover:bg-dark-surface-2 hover:text-neutral-900 dark:hover:text-dark-text transition-colors duration-200"
    [attr.aria-expanded]="isOpen()"
    aria-controls="nav-sidebar"
    [attr.aria-label]="isOpen() ? 'Fechar menu de navegação' : 'Abrir menu de navegação'"
    (click)="toggleMenu()"
  >
    @if (isOpen()) {
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    } @else {
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    }
  </button>

  <!-- Theme toggle — mobile top bar -->
  <button
    type="button"
    class="flex items-center gap-1.5 p-1.5 rounded-full transition-colors duration-200 text-neutral-600 dark:text-dark-muted hover:bg-neutral-100 dark:hover:bg-dark-surface-2"
    [attr.aria-label]="themeService.isDark() ? 'Ativar modo claro' : 'Ativar modo escuro'"
    [attr.aria-pressed]="themeService.isDark()"
    (click)="themeService.toggle()"
  >
    @if (themeService.isDark()) {
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <circle cx="12" cy="12" r="4"/>
        <path stroke-linecap="round" d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
    } @else {
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>
      </svg>
    }
  </button>
</div>

<!-- Backdrop — mobile only -->
@if (isOpen()) {
  <div
    class="lg:hidden fixed inset-0 z-30 bg-black/20"
    aria-hidden="true"
    (click)="closeMenu()"
  ></div>
}

<!-- Sidebar -->
<nav
  #navSidebar
  id="nav-sidebar"
  aria-label="Navegação da página"
  class="fixed top-0 left-0 z-40 h-full w-52 flex flex-col pt-16 pb-8 px-4
    bg-white dark:bg-dark-surface
    -translate-x-full lg:translate-x-0
    transition-[transform,background-color,color] duration-300"
  [class.-translate-x-full]="!isOpen()"
  [class.translate-x-0]="isOpen()"
  [attr.inert]="(!isOpen() && !isDesktop()) ? '' : null"
  (keydown)="onNavKeydown($event)"
>
  <ul role="list" class="flex flex-col gap-1 flex-1">
    @for (item of navItems; track item.id) {
      <li>
        <a
          [href]="'#' + item.id"
          [class]="navLinkClass(item.id)"
          [attr.aria-current]="activeSection() === item.id ? 'location' : null"
          (click)="closeMenu()"
        >
          {{ item.label }}
        </a>
      </li>
    }
  </ul>

  <!-- Theme toggle — desktop sidebar (bottom) -->
  <div class="hidden lg:block mt-auto pt-4 border-t border-neutral-200 dark:border-dark-border">
    <button
      type="button"
      class="w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm font-medium transition-colors duration-200
        text-neutral-600 dark:text-dark-muted
        hover:bg-neutral-100 dark:hover:bg-dark-surface-2
        hover:text-neutral-900 dark:hover:text-dark-text"
      [attr.aria-label]="themeService.isDark() ? 'Ativar modo claro' : 'Ativar modo escuro'"
      [attr.aria-pressed]="themeService.isDark()"
      (click)="themeService.toggle()"
    >
      <!-- Switch track -->
      <span
        class="relative inline-flex h-5 w-9 shrink-0 items-center rounded-full transition-colors duration-300"
        [class.bg-accent]="themeService.isDark()"
        [class.bg-neutral-300]="!themeService.isDark()"
        aria-hidden="true"
      >
        <span
          class="absolute flex items-center justify-center h-3.5 w-3.5 rounded-full bg-white shadow transition-transform duration-300"
          [class.translate-x-4]="themeService.isDark()"
          [class.translate-x-0.5]="!themeService.isDark()"
        >
          @if (themeService.isDark()) {
            <svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor" class="text-accent" aria-hidden="true">
              <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>
            </svg>
          } @else {
            <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="text-neutral-400" aria-hidden="true">
              <circle cx="12" cy="12" r="4"/>
              <path stroke-linecap="round" d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
            </svg>
          }
        </span>
      </span>
      <span>{{ themeService.isDark() ? 'Modo claro' : 'Modo escuro' }}</span>
    </button>
  </div>
</nav>
