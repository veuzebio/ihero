<section id="experience" aria-labelledby="experience-heading" class="px-6 py-24">
  <div class="max-w-2xl mx-auto">
    <h2 id="experience-heading" class="text-3xl font-bold text-[--color-neutral-900] mb-8">
      Experiência
    </h2>

    <ul class="flex flex-col gap-8" role="list">
      @for (item of items; track item.company + '-' + item.period) {
        <li class="border-l-2 border-[--color-accent] pl-6">
          <h3 class="text-xl font-semibold text-[--color-neutral-900]">{{ item.role }}</h3>
          <p class="text-sm text-[--color-neutral-600]">{{ item.period }}</p>
          <p class="text-[--color-neutral-800] font-medium">{{ item.company }}</p>
          <p class="text-[--color-neutral-600] mt-2">{{ item.description }}</p>
        </li>
      }
    </ul>
  </div>
</section>
