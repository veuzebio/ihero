<section id="education" aria-labelledby="education-heading" class="px-6 py-24">
  <div class="max-w-2xl mx-auto">
    <h2 id="education-heading" class="text-3xl font-bold text-[--color-neutral-900] mb-12">Formação</h2>

    <ul class="flex flex-col gap-6" role="list">
      @for (item of education; track item.institution + item.degree) {
        <li class="flex flex-col gap-1 px-6 py-5 rounded-2xl bg-white border border-[--color-neutral-200]">
          <span class="text-base font-semibold text-[--color-neutral-900]">{{ item.degree }}</span>
          <span class="text-sm text-[--color-neutral-600]">{{ item.institution }}</span>
          <span class="text-xs text-[--color-neutral-600]">{{ item.year }}</span>
        </li>
      }
    </ul>
  </div>
</section>
