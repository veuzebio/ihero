<section id="skills" aria-labelledby="skills-heading" class="px-6 py-24 bg-neutral-50">
  <div class="max-w-2xl mx-auto">
    <h2 id="skills-heading" class="text-3xl font-bold text-neutral-900 mb-12">Habilidades</h2>

    <ul class="flex flex-wrap gap-4" role="list">
      @for (skill of skills; track skill.name) {
        <li class="flex flex-col gap-0.5 px-4 py-3 rounded-xl bg-neutral-100 min-w-32">
          <span class="text-base font-semibold text-neutral-900">{{ skill.name }}</span>
          <span class="text-xs text-neutral-400 capitalize">{{ skill.level }}</span>
        </li>
      }
    </ul>
  </div>
</section>
